[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Posts reclassified between Articles and Blog keep their old URLs working (301).
# These must come before the SPA catch-all below (Netlify uses first match).
[[redirects]]
  from = "/articles/the-pain-no-one-can-see"
  to = "/blog/the-pain-no-one-can-see"
  status = 301
  force = true
[[redirects]]
  from = "/articles/the-weight-of-regret"
  to = "/blog/the-weight-of-regret"
  status = 301
  force = true
[[redirects]]
  from = "/articles/growing-in-patience"
  to = "/blog/growing-in-patience"
  status = 301
  force = true
[[redirects]]
  from = "/articles/how-to-grieve-without-a-timeline"
  to = "/blog/how-to-grieve-without-a-timeline"
  status = 301
  force = true
[[redirects]]
  from = "/articles/gratitude-changes-everything"
  to = "/blog/gratitude-changes-everything"
  status = 301
  force = true
[[redirects]]
  from = "/articles/when-youre-too-tired-to-pray"
  to = "/blog/when-youre-too-tired-to-pray"
