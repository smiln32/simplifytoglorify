<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scripture of the Day</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: stretch;
      height: 100vh;
      margin: 0;
      padding: 0;
      font-family: 'Lora', Georgia, serif;
    }

    .container {
      width: 100%;
      height: 100%;
    }

    .scripture-card {
      background: linear-gradient(135deg, #b2c6b1 0%, #a4b9c4 100%);
      height: 100%;
      border-radius: 0;
      padding: 2rem 1.3rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .content-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
    }

    .reference {
      font-size: 16px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 2.0rem;
      margin-top: 1rem;
    }

    .divider-line {
      width: 200px;
      height: 1px;
      background: rgba(255, 255, 255, 0.5);
      margin: 0 auto 2.0rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .heart-dot {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .scripture-text {
      font-size: 24px;
      font-style: italic;
      line-height: 1.6;
      letter-spacing: 0.2px;
      color: white;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
      width: 100%;
    }

    button {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 0.65rem 1.3rem;
      font-size: 12px;
      cursor: pointer;
      border-radius: 0;
      font-family: 'Lora', Georgia, serif;
      transition: all 0.25s ease;
      letter-spacing: 0.5px;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.6);
    }

    button:active {
      background: rgba(255, 255, 255, 0.35);
    }

    .counter {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 1rem;
      letter-spacing: 0.5px;
    }

    @media (max-width: 600px) {
      .scripture-card {
        padding: 2.5rem 1.5rem;
      }

      .reference {
        font-size: 12px;
        letter-spacing: 2px;
      }

      .scripture-text {
        font-size: 16px;
        line-height: 1.75;
      }

      button {
        padding: 0.55rem 1rem;
        font-size: 11px;
      }

    }
  </style>
</head>
<body>

  <div class="container">
    <div class="scripture-card">
      <div class="content-wrapper">
        <div>
          <div class="reference" id="reference">Psalm 145:10</div>
          <div class="divider-line">
            <div class="heart-dot"></div>
          </div>
          <div class="scripture-text" id="scripture">All Your works will give thanks to You, LORD, and Your godly ones will bless You.</div>
        </div>

        <div>
          <div class="controls">
            <button onclick="previousScripture()">← Previous</button>
            <button onclick="nextScripture()">Next →</button>
          </div>
          <div class="counter" id="counter">1 / 70</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const scriptures = [
  { reference: "Psalm 145:10", text: "All Your works will give thanks to You, LORD, And Your godly ones will bless You." },
  { reference: "Romans 8:28", text: "And we know that God causes all things to work together for good to those who love God, to those who are called according to His purpose." },
  { reference: "Psalm 103:2", text: "Bless the LORD, my soul, And do not forget any of His benefits;" },
  { reference: "Ephesians 1:3", text: "Blessed be the God and Father of our Lord Jesus Christ, who has blessed us with every spiritual blessing in the heavenly places in Christ." },
  { reference: "James 1:5", text: "But if any of you lacks wisdom, let him ask of God, who gives to all generously and without reproach, and it will be given to him." },
  { reference: "Psalm 50:15", text: "Call upon Me on the day of trouble; I will rescue you, and you will honor Me." },
  { reference: "Psalm 55:22", text: "Cast your burden upon the LORD and He will sustain you; He will never allow the righteous to be shaken." },
  { reference: "Psalm 118:1", text: "Give thanks to the LORD, for He is good; For His mercy is everlasting." },
  { reference: "Colossians 4:2", text: "Devote yourselves to prayer, keeping alert in it with an attitude of thanksgiving;" },
  { reference: "Luke 12:32", text: "Do not be afraid, little flock, because your Father has chosen to give you the kingdom." },
  { reference: "Psalm 100:4", text: "Enter His gates with thanksgiving, And His courtyards with praise. Give thanks to Him, bless His name." },
  { reference: "Psalm 23:4", text: "Even though I walk through the valley of the shadow of death, I fear no evil, for You are with me; Your rod and Your staff, they comfort me." },
  { reference: "2 Corinthians 4:15", text: "For all things are for your sakes, so that grace, having spread to more and more people, will cause thanksgiving to overflow to the glory of God." },
  { reference: "Psalm 136:26", text: "Give thanks to the God of heaven, For His faithfulness is everlasting." },
  { reference: "Psalm 5:3", text: "In the morning, LORD, You will hear my voice; In the morning I will present my prayer to You and be on the watch." },
  { reference: "1 Chronicles 16:34", text: "Give thanks to the LORD, for He is good; For His faithfulness is everlasting." },
  { reference: "Psalm 136:4", text: "To Him who alone does great wonders, For His faithfulness is everlasting;" },
  { reference: "Colossians 1:12", text: "giving thanks to the Father, who has qualified us to share in the inheritance of the saints in light." },
  { reference: "Psalm 63:1", text: "God, You are my God; I shall be watching for You; My soul thirsts for You, my flesh yearns for You, In a dry and exhausted land where there is no water." },
  { reference: "Joshua 1:9", text: "Have I not commanded you? Be strong and courageous! Do not be terrified nor dismayed, for the LORD your God is with you wherever you go." },
  { reference: "1 Peter 5:7", text: "having cast all your anxiety on Him, because He cares about you." },
  { reference: "2 Corinthians 9:11", text: "You will be enriched in everything for all generosity, which through us is producing thanksgiving to God." },
  { reference: "Psalm 17:6", text: "I have called upon You, for You will answer me, God; Incline Your ear to me, hear my speech." },
  { reference: "Psalm 34:4", text: "I sought the LORD and He answered me, And rescued me from all my fears." },
  { reference: "Psalm 62:8", text: "Trust in Him at all times, you people; Pour out your hearts before Him; God is a refuge for us." },
  { reference: "Psalm 9:1", text: "I will give thanks to the LORD with all my heart; I will tell of all Your wonders." },
  { reference: "Psalm 121:1-2", text: "I will raise my eyes to the mountains; From where will my help come? My help comes from the LORD, Who made heaven and earth." },
  { reference: "1 Thessalonians 5:18", text: "in everything give thanks; for this is the will of God for you in Christ Jesus." },
  { reference: "Psalm 92:1", text: "It is good to give thanks to the LORD And to sing praises to Your name, Most High;" },
  { reference: "Matthew 26:41", text: "Keep watching and praying, so that you do not come into temptation; the spirit is willing, but the flesh is weak." },
  { reference: "Colossians 3:15", text: "Let the peace of Christ, to which you were indeed called in one body, rule in your hearts; and be thankful." },
  { reference: "Psalm 141:2", text: "May my prayer be counted as incense before You; The raising of my hands as the evening offering." },
  { reference: "Romans 15:13", text: "Now may the God of hope fill you with all joy and peace in believing, so that you will abound in hope by the power of the Holy Spirit." },
  { reference: "John 14:27", text: "Peace I leave you, My peace I give you; not as the world gives, do I give to you. Do not let your hearts be troubled, nor fearful." },
  { reference: "1 Thessalonians 5:16-18", text: "Rejoice always, pray without ceasing, in everything give thanks; for this is the will of God for you in Christ Jesus." },
  { reference: "Romans 12:12", text: "rejoicing in hope, persevering in tribulation, devoted to prayer," },
  { reference: "Revelation 7:12", text: "saying, Amen, blessing, glory, wisdom, thanksgiving, honor, power, and might belong to our God forever and ever. Amen." },
  { reference: "Psalm 30:12", text: "That my soul may sing praise to You and not be silent. LORD my God, I will give thanks to You forever." },
  { reference: "Hebrews 4:16", text: "Therefore let’s approach the throne of grace with confidence, so that we may receive mercy and find grace for help at the time of our need." },
  { reference: "Psalm 94:19", text: "When my anxious thoughts multiply within me, Your comfort delights my soul." },
  { reference: "Psalm 28:7", text: "The LORD is my strength and my shield; My heart trusts in Him, and I am helped; Therefore my heart triumphs, And with my song I shall thank Him." },
  { reference: "Isaiah 26:3", text: "The steadfast of mind You will keep in perfect peace, Because he trusts in You." },
  { reference: "1 John 4:18", text: "There is no fear in love, but perfect love drives out fear, because fear involves punishment, and the one who fears is not perfected in love." },
  { reference: "Psalm 145:18", text: "The LORD is near to all who call on Him, To all who call on Him in truth." },
  { reference: "Psalm 118:24", text: "This is the day which the LORD has made; Let’s rejoice and be glad in it." },
  { reference: "Hebrews 13:15", text: "Through Him then, let’s continually offer up a sacrifice of praise to God, that is, the fruit of lips praising His name." },
  { reference: "Colossians 3:17", text: "Whatever you do in word or deed, do everything in the name of the Lord Jesus, giving thanks through Him to God the Father." },
  { reference: "Matthew 6:33", text: "But seek first His kingdom and His righteousness, and all these things will be provided to you." },
  { reference: "Psalm 46:1", text: "God is our refuge and strength, A very ready help in trouble." },
  { reference: "2 Timothy 1:7", text: "For God has not given us a spirit of timidity, but of power and love and discipline." },
  { reference: "Galatians 6:9", text: "Let’s not become discouraged in doing good, for in due time we will reap, if we do not become weary." },
    ];

    let currentIndex = 0;

    function updateDisplay() {
      const current = scriptures[currentIndex];
      document.getElementById('reference').textContent = current.reference;
      document.getElementById('scripture').textContent = current.text;
      document.getElementById('counter').textContent = (currentIndex + 1) + ' / ' + scriptures.length;
    }

    function nextScripture() {
      currentIndex = (currentIndex + 1) % scriptures.length;
      updateDisplay();
    }

    function previousScripture() {
      currentIndex = (currentIndex - 1 + scriptures.length) % scriptures.length;
      updateDisplay();
    }

    // Initialize
    updateDisplay();
  </script>

</body>
</html>
